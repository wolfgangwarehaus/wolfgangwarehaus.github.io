<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>wolfgang warehaus — check out my apps</title>
<meta name="description" content="wolfgang warehaus — small, self-hosted desktop apps. Free & open source.">
<meta property="og:title" content="wolfgang warehaus">
<meta property="og:description" content="Small, self-hosted desktop apps. Free & open source.">
<meta property="og:type" content="website">
<style>
  :root {
    --jelly: #7C66D0;
    --jelly-bright: #9D8AE8;
    --bg: #141218;
    --panel: rgba(255,255,255,0.045);
    --panel-border: rgba(255,255,255,0.09);
    --text: #ECEAF2;
    --dim: #A8A3B8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background:
      radial-gradient(1100px 500px at 70% -10%, rgba(124,102,208,0.22), transparent 60%),
      radial-gradient(800px 400px at 10% 110%, rgba(224,164,76,0.10), transparent 60%),
      var(--bg);
    color: var(--text);
    font: 16px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 96px 24px 48px; flex: 1; width: 100%; }
  header { text-align: center; margin-bottom: 48px; }
  h1 { font-size: 2.9rem; line-height: 1.0; letter-spacing: -0.02em; margin-bottom: 14px; }
  .tagline { color: var(--dim); font-size: 1.1rem; }

  .apps { display: flex; flex-direction: column; gap: 14px; }
  .app {
    display: flex; align-items: center; gap: 18px; text-decoration: none; color: inherit;
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 16px; padding: 20px 22px;
    transition: border-color .15s, background .15s, transform .15s;
  }
  .app:hover { border-color: var(--jelly-bright); background: rgba(124,102,208,0.12); transform: translateY(-2px); }
  .app img { width: 56px; height: 56px; flex: none; filter: drop-shadow(0 6px 18px rgba(124,102,208,0.32)); }
  .app .body { flex: 1; }
  .app h2 { font-size: 1.2rem; margin-bottom: 2px; }
  .app p { color: var(--dim); font-size: 0.95rem; }
  .app .arrow { color: var(--dim); font-size: 1.4rem; transition: transform .15s, color .15s; }
  .app:hover .arrow { color: var(--jelly-bright); transform: translateX(3px); }

  .soon { text-align: center; color: var(--dim); font-size: 0.9rem; margin-top: 36px; }

  footer { text-align: center; color: var(--dim); font-size: 0.85rem; padding: 24px; }
  footer a { color: var(--dim); }
  footer a:hover { color: var(--text); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>wolfgang<br>warehaus</h1>
      <p class="tagline">check out my apps!</p>
    </header>

    <div class="apps">
      <a class="app" href="/jellytoast/">
        <img src="jellytoast.svg" alt="jellytoast logo">
        <div class="body">
          <h2>jellytoast</h2>
          <p>A desktop music player for Jellyfin and Navidrome servers.</p>
        </div>
        <span class="arrow" aria-hidden="true">→</span>
      </a>
    </div>

    <p class="soon">More coming soon.</p>
  </div>

  <footer>
    <a href="https://github.com/wolfgangwarehaus">GitHub</a>
  </footer>
</body>
</html>
