name: Deploy site
# Builds the app blogs (Markdown -> HTML via build_blog.py) and deploys the whole
# umbrella (apex + /jellytoast + future apps) to Pages -> wolfgangwarehaus.com.
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build the jellytoast blog
        run: |
          python -m pip install --upgrade pip
          pip install markdown
          python jellytoast/blog/build_blog.py
      - name: Assemble deploy dir (exclude VCS + CI)
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
